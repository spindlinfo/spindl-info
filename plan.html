function getLang() {
  const params = new URLSearchParams(window.location.search);
  const forced = (params.get('lang') || '').toLowerCase();
  if (['cs','de','pl','en'].includes(forced)) return forced;
  const nav = ((navigator.languages && navigator.languages[0]) || navigator.language || 'en').toLowerCase();
  if (nav.startsWith('cs')) return 'cs';
  if (nav.startsWith('de')) return 'de';
  if (nav.startsWith('pl')) return 'pl';
  return 'en';
}

function dataLang(lang) { return lang === 'cs' ? 'cz' : lang; }
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function formatKm(km, lang) {
  const loc = lang === 'en' ? 'en-US' : (lang === 'de' ? 'de-DE' : (lang === 'pl' ? 'pl-PL' : 'cs-CZ'));
  return Number(km).toLocaleString(loc, { maximumFractionDigits: 1 });
}
function toggleRoute(routeId) {
  const target = document.getElementById('route-' + routeId);
  if (!target) return;
  const shouldOpen = !target.classList.contains('open');
  document.querySelectorAll('.route-card.open').forEach(card => {
    card.classList.remove('open');
    const btn = card.querySelector('.route-trigger');
    if (btn) btn.setAttribute('aria-expanded', 'false');
  });
  if (shouldOpen) {
    target.classList.add('open');
    const btn = target.querySelector('.route-trigger');
    if (btn) btn.setAttribute('aria-expanded', 'true');
  }
}
function routeKind(r, lang) {
  const key = dataLang(lang);
  const diff = (r.diffLabels && (r.diffLabels[key] || r.diffLabels.en)) || '';
  const km = formatKm(r.km, lang);
  return `${km} km • ${r.time} • ${diff}`;
}
function render() {
  const lang = getLang();
  const key = dataLang(lang);
  const t = T[lang] || T.en;
  document.documentElement.lang = lang;
  document.title = t.title + ' | Spindl.info';
  document.getElementById('txt-subtitle').textContent = t.subtitle;
  document.getElementById('txt-title').textContent = t.title;
  document.getElementById('txt-lead').textContent = t.lead;
  document.getElementById('txt-tap-hint').textContent = t.tapHint;
  document.getElementById('btn-back').textContent = t.back;
  document.getElementById('btn-back').href = t.homeUrl;
  document.getElementById('txt-section').textContent = t.section;

  const wrap = document.getElementById('routes');
  wrap.innerHTML = routes.map((r, i) => {
    const id = 'plan-' + i;
    const title = (r.names && (r.names[key] || r.names.en)) || 'Route';
    const desc = (r.texts && (r.texts[key] || r.texts.en)) || '';
    const diff = (r.diffLabels && (r.diffLabels[key] || r.diffLabels.en)) || '';
    const km = formatKm(r.km, lang);
    return `
      <article class="route-card" id="route-${id}">
        <button class="route-trigger" type="button" onclick="toggleRoute('${id}')" aria-expanded="false" aria-controls="detail-${id}">
          <div class="route-head">
            <div class="route-number">${i + 1}</div>
            <div class="route-main">
              <div class="route-topline">
                <div>
                  <h2 class="route-title">${esc(title)}</h2>
                  <div class="route-type">${esc(routeKind(r, lang))}</div>
                </div>
                <div class="chevron">⌄</div>
              </div>
              <div class="quick-stats">
                <div class="quick-stat"><span class="quick-label">${esc(t.dist)}</span><span class="quick-value">${km} km</span></div>
                <div class="quick-stat"><span class="quick-label">${esc(t.time)}</span><span class="quick-value">${esc(r.time)}</span></div>
                <div class="quick-stat"><span class="quick-label">${esc(t.diff)}</span><span class="quick-value">${esc(diff)}</span></div>
              </div>
            </div>
          </div>
        </button>
        <div class="route-details" id="detail-${id}">
          <div class="stats-grid">
            <div class="stat"><span class="stat-label">${esc(t.dist)}</span><span class="stat-value">${km} km</span></div>
            <div class="stat"><span class="stat-label">${esc(t.time)}</span><span class="stat-value">${esc(r.time)}</span></div>
            <div class="stat"><span class="stat-label">${esc(t.elev)}</span><span class="stat-value">${(Number.isFinite(r.up) && Number.isFinite(r.down)) ? `+${r.up} / −${r.down} m` : esc(t.elevationNA)}</span></div>
            <div class="stat"><span class="stat-label">${esc(t.diff)}</span><span class="stat-value">${esc(diff)}</span></div>
          </div>
          <p class="route-desc">${esc(desc)}</p>
          <a class="button btn-transport" href="${esc(r.url)}" target="_blank" rel="noopener">${esc(t.open)}</a>
        </div>
      </article>
    `;
  }).join('');
}
render();
</script>
